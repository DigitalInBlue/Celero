name: CMake on multiple platforms

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        build_type: [Debug, Release]
        compiler:
          - name: gcc-12
            cc: gcc-12
            cxx: g++-12
          - name: gcc-13
            cc: gcc-13
            cxx: g++-13
          - name: gcc-14
            cc: gcc-14
            cxx: g++-14
          - name: clang-16
            cc: clang-16
            cxx: clang++-16
          - name: clang-17
            cc: clang-17
            cxx: clang++-17
          - name: clang-18
            cc: clang-18
            cxx: clang++-18
          - name: cl
            cc: cl
            cxx: cl
          - name: appleclang
            cc: clang
            cxx: clang++
        exclude:
          # MSVC only on Windows
          - os: ubuntu-latest
            compiler:
              name: cl
          - os: macos-latest
            compiler:
              name: cl
          # GCC/Clang versioned compilers not on Windows
          - os: windows-latest
            compiler:
              name: gcc-12
          - os: windows-latest
            compiler:
              name: gcc-13
          - os: windows-latest
            compiler:
              name: gcc-14
          - os: windows-latest
            compiler:
              name: clang-16
          - os: windows-latest
            compiler:
              name: clang-17
          - os: windows-latest
            compiler:
              name: clang-18
          # AppleClang only on macOS
          - os: ubuntu-latest
            compiler:
              name: appleclang
          - os: windows-latest
            compiler:
              name: appleclang
          # GCC/Clang versioned compilers not on macOS
          - os: macos-latest
            compiler:
              name: gcc-12
          - os: macos-latest
            compiler:
              name: gcc-13
          - os: macos-latest
            compiler:
              name: gcc-14
          - os: macos-latest
            compiler:
              name: clang-16
          - os: macos-latest
            compiler:
              name: clang-17
          - os: macos-latest
            compiler:
              name: clang-18

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        id: vcpkg
        uses: johnwason/vcpkg-action@v7.0.1
        with:
          manifest-dir: ${{ github.workspace }}
          triplet: >-
            ${{
              matrix.os == 'windows-latest' && 'x64-windows' ||
              matrix.os == 'macos-latest' && 'arm64-osx' ||
              'x64-linux'
            }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CC: ${{ matrix.compiler.cc }}
          CXX: ${{ matrix.compiler.cxx }}
        run: |
          cmake -S . -B build \
            ${{ steps.vcpkg.outputs.vcpkg-cmake-config }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCELERO_ENABLE_TESTS=ON \
            -DCELERO_ENABLE_EXPERIMENTS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build ${{ steps.vcpkg.outputs.vcpkg-cmake-config }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCELERO_ENABLE_TESTS=ON -DCELERO_ENABLE_EXPERIMENTS=ON

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Run tests
        shell: bash
        run: |
          cd build
          ctest --output-on-failure -C ${{ matrix.build_type }}

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        id: vcpkg
        uses: johnwason/vcpkg-action@v7.0.1
        with:
          manifest-dir: ${{ github.workspace }}
          triplet: x64-linux
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure with AddressSanitizer
        shell: bash
        env:
          CC: clang-16
          CXX: clang++-16
        run: |
          cmake -S . -B build \
            ${{ steps.vcpkg.outputs.vcpkg-cmake-config }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCELERO_ENABLE_TESTS=ON \
            -DCELERO_ENABLE_EXPERIMENTS=ON \
            -DCELERO_ENABLE_CLANG_ADDRESS_SANITIZER=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Debug

      - name: Run tests under ASAN
        shell: bash
        run: |
          cd build
          ctest --output-on-failure -C Debug
