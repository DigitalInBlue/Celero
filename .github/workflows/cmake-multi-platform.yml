# File: .github/workflows/cmake-multi-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Test on both latest and LTS/base images
        os:
          - ubuntu-latest # current Ubuntu
          - ubuntu-20.04 # older Ubuntu
          - windows-latest # current Windows
          - windows-2019 # older Windows
        build_type: [Debug, Release]
        # Mix compilers and versions
        compiler:
          - name: gcc-9
            cc: gcc-9
            cxx: g++-9
          - name: gcc-10
            cc: gcc-10
            cxx: g++-10
          - name: gcc-11
            cc: gcc-11
            cxx: g++-11
          - name: clang-12
            cc: clang-12
            cxx: clang++-12
          - name: clang-13
            cc: clang-13
            cxx: clang++-13
          - name: cl
            cc: cl
            cxx: cl
        # Exclude invalid combos (e.g., gcc/clang on Windows older than MSVC)
        exclude:
          - os: windows-latest
            compiler:
              name: gcc-9
          - os: windows-latest
            compiler:
              name: gcc-10
          - os: windows-latest
            compiler:
              name: gcc-11
          - os: windows-latest
            compiler:
              name: clang-12
          - os: windows-latest
            compiler:
              name: clang-13

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/vcpkg
            C:/vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ matrix.build_type }}-${{ matrix.compiler.name }}

      - name: Setup vcpkg
        uses: microsoft/vcpkg-action@v2
        with:
          install: .

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -S .

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -- -j$(nproc)

      - name: Run Tests
        working-directory: build
        run: |
          ctest --output-on-failure --build-config ${{ matrix.build_type }}
